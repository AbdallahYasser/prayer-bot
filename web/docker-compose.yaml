services:
  prayer-web:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    networks:
      - coolify
    volumes:
      - /var/lib/docker/volumes/xkkwgc04wgs4sosk4k0ckgw8_prayer-bot-data/_data:/app/data:ro

networks:
  coolify:
    external: true
    name: coolify
