services:
  prayer-web:
    build: .
    restart: unless-stopped
    env_file: .env
    expose:
      - "8080"
    networks:
      - coolify
    volumes:
      - prayer_bot_data:/app/data:ro

networks:
  coolify:
    external: true
    name: coolify

volumes:
  prayer_bot_data:
    external: true
    name: xkkwgc04wgs4sosk4k0ckgw8_prayer_bot_data
